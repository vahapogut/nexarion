
services:
  nexarion:
    build: .
    ports:
      - '3000:3000'
    environment:
      - NEXARION_AGENTS=${NEXARION_AGENTS:-}
      - A2A_AUTH_TOKEN=${A2A_AUTH_TOKEN:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
