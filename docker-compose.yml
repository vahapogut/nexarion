version: '3.8'

services:
  nexarion:
    build: .
    ports:
      - '3000:3000'
    environment:
      - NEXARION_AGENTS=https://mock-agent:3001
      - A2A_AUTH_TOKEN=
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      retries: 3
    restart: unless-stopped

  mock-agent:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./packages/mock/dist:/app
    command: node /app/index.js
    ports:
      - '3001:3001'
