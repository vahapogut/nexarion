services:
  nexarion:
    build: .
    ports:
      - '3000:3000'
    environment:
      - A2A_AUTH_TOKEN=${A2A_AUTH_TOKEN:-}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
